<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch Web App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="stopwatch-container">
    <h1>Stopwatch</h1>

    <div class="display" id="display">00:00:00.00</div>

    <div class="controls">
      <button id="startBtn" class="btn start">Start</button>
      <button id="pauseBtn" class="btn pause" disabled>Pause</button>
      <button id="lapBtn" class="btn lap" disabled>Lap</button>
      <button id="resetBtn" class="btn reset">Reset</button>
    </div>

    <ul id="lapList" class="lap-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
